name: Publish NuGet

on:
  push:
    tags:
      - '*-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Parse tag
      id: tag
      run: |
        TAG="${GITHUB_REF_NAME}"
        PACKAGE="${TAG%-v*}"
        VERSION="${TAG##*-v}"
        echo "PACKAGE=${PACKAGE}" >> $GITHUB_OUTPUT
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Publishing package '${PACKAGE}' version ${VERSION}"

    - name: Resolve project
      id: project
      run: |
        PACKAGE="${{ steps.tag.outputs.PACKAGE }}"
        # Map tag prefix to project name + matching test project.
        case "$PACKAGE" in
          core)           PROJECT="EasyReasy.Database";                TEST_PROJECT="EasyReasy.Database.Tests" ;;
          sqlite)         PROJECT="EasyReasy.Database.Sqlite";         TEST_PROJECT="EasyReasy.Database.Tests" ;;
          testing)        PROJECT="EasyReasy.Database.Testing";        TEST_PROJECT="EasyReasy.Database.Tests" ;;
          npgsql)         PROJECT="EasyReasy.Database.Npgsql";         TEST_PROJECT="EasyReasy.Database.Tests" ;;
          mapping)        PROJECT="EasyReasy.Database.Mapping";        TEST_PROJECT="EasyReasy.Database.Mapping.Tests" ;;
          mapping-npgsql) PROJECT="EasyReasy.Database.Mapping.Npgsql"; TEST_PROJECT="EasyReasy.Database.Mapping.Npgsql.Tests" ;;
          *)              echo "Unknown package: $PACKAGE" && exit 1 ;;
        esac
        echo "PROJECT=${PROJECT}" >> $GITHUB_OUTPUT
        echo "TEST_PROJECT=${TEST_PROJECT}" >> $GITHUB_OUTPUT
        echo "Project: ${PROJECT}"
        echo "Test project: ${TEST_PROJECT}"

    - name: Setup Postgres
      run: chmod +x setup_test_db.sh && ./setup_test_db.sh
    - name: Wait for Postgres
      run: |
        until docker exec postgres-test pg_isready -U postgres; do
          echo "Waiting for postgres..."
          sleep 2
        done

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.tag.outputs.VERSION }}

    # Only run the test project matching the package being published, and skip:
    # - IntegrationTests: require external services or are placeholders not meant for CI.
    # - PerformanceTest: memory/timing assertions that are unreliable on shared CI runners.
    - name: Test
      run: dotnet test ${{ steps.project.outputs.TEST_PROJECT }} --no-build --configuration Release --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~PerformanceTest"

    - name: Pack
      run: dotnet pack ${{ steps.project.outputs.PROJECT }} --no-build --configuration Release -p:Version=${{ steps.tag.outputs.VERSION }} --output ./nupkgs

    - name: Publish to NuGet
      run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
